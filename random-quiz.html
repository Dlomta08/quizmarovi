<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>შემთხვევითი ქვიზი</title>
    <script>
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
        const initialDark = savedTheme ? savedTheme === 'dark' : prefersDark.matches;
        document.documentElement.setAttribute('data-theme', initialDark ? 'dark' : 'light');
    </script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="quiz-style.css">
    <link rel="icon" type="image/png" href="paper.png">
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <style>
        .quiz-info-box {
            text-align: left;
            margin: 0 auto 2rem;
            padding: 1rem 1.5rem;
            background: var(--card-bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
    </style>
    <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    .quiz-view-container {
      flex: 1;
    }
    
  </style>
    <script src="darkmode.js"></script>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-content">
            <a href="random-quiz-generator.html" id="back-link" class="logo">
                <i class="fas fa-arrow-left"></i>
                <span>უკან დაბრუნება</span>
            </a>
            <button id="toggle-dark" aria-label="Toggle dark mode">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="quiz-view-container">
        <div class="quiz-card-main">
            <h1 id="quiz-title" class="text-title">შემთხვევითი ქვიზი</h1>

            <div id="quiz-info-container"></div>

            <div id="mode-selection" class="mode-selection-card" style="display: none;">
                <p>აირჩიეთ რეჟიმი:</p>
                <div>
                    <button class="button" onclick="startQuiz(false)">სტანდარტული</button>
                    <button class="button" onclick="startQuiz(true)">სიმულაცია</button>
                </div>
            </div>

            <div id="timer" style="display: none;">დარჩენილი დრო: <span id="time">03:00:00</span></div>

            <form id="quizForm" style="display:none;"></form>

            <div id="error-container" style="display: none;">
                <h2>ქვიზი არ ჩატარებულა.</h2>
                <p>ქვიზის მონაცემები ვერ მოიძებნა. გთხოვთ დაუბრუნდეთ გენერატორს და ხელახლა სცადოთ.</p>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <p>&copy; 2025 კომაროვის სკოლა. ყველა უფლება დაცულია.</p>
        <p>კითხვების შემთხვევაში დაგვიკავშირდით :
        <a href="mailto:komaroviqvizebi@gmail.com" class="email-link">komaroviqvizebi@gmail.com</a>
        </p>

        <style>
        .email-link {
            color: var(--primary-color);
            text-decoration: none;
            transition: text-decoration 0.2s ease;
        }

    .email-link:hover {
        text-decoration: underline;
    }
    </style>
    </footer>

    <script>
        const storedData = sessionStorage.getItem('randomQuizData');
        const storedConfig = sessionStorage.getItem('randomQuizConfig');
        
        if (!storedData) {
            document.getElementById('error-container').style.display = 'block';
            document.getElementById('quiz-title').style.display = 'none';
        } else {
            window.quizData = JSON.parse(storedData);
            let config = storedConfig ? JSON.parse(storedConfig) : null;
            
            document.getElementById("quiz-title").textContent = `შემთხვევითი ქვიზი (${window.quizData.length} ამოცანა)`;
            
            if (config) {
                const infoContainer = document.getElementById('quiz-info-container');
                const classText = config.classes.map(c => `${c}-კლასი`).join(', ');
                
                infoContainer.innerHTML = `
                    <div class="quiz-info-box">
                        <strong>კლასები:</strong> ${classText}<br>
                        <small>მოძებნილი ამოცანები: ${config.totalAvailable} | არჩეული: ${window.quizData.length}</small>
                    </div>
                `;
            }
            
            document.getElementById("mode-selection").style.display = "block";
        }
    </script>
         
    <script src="quiz.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const hideButton = () => {
            document.querySelectorAll(".mark-done-btn").forEach(btn => btn.remove());
        };
        hideButton();
        const observer = new MutationObserver(hideButton);
        observer.observe(document.body, { childList: true, subtree: true });
    });
    </script>
    <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
